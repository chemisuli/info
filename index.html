<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Платежная страница</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 20px 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333333;
            margin-bottom: 20px;
        }
        h2 {
            color: #555555;
            margin-top: 20px;
            font-size: 20px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 5px;
        }
        .account {
            margin: 10px 0;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        .account span {
            font-weight: bold;
            color: #4a90e2;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            color: #4a90e2;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Платежная страница</h1>

    <h2>Счета для оплаты</h2>
    <!-- Замените приведенные ниже примеры на свои реальные данные. -->
    <div class="account">
        <span>Счет №1:</span> 1234 5678 9012 3456
    </div>
    <div class="account">
        <span>Счет №2:</span> 9876 5432 1098 7654
    </div>

    <h2>Полезные ссылки</h2>
    <ul>
        <!-- Измените текст и адрес ссылки на нужные вам. -->
        <li><a href="https://example.com/first-link" target="_blank">Первый сайт</a></li>
        <li><a href="https://example.com/second-link" target="_blank">Второй сайт</a></li>
    </ul>

    <p>Для изменения информации на этой странице, отредактируйте файл <code>index.html</code>.</p>
</div>
</body>
</html>
