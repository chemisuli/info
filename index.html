<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Details</title>

  <style>
    @font-face {
      font-family: "Oldbook ITC";
      src: url("oldbook.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Briar Display";
      src: url("briar.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --brown: #360100;
      --cream: #FFF4E5;
      --lavender: #CCB8EF;
      --line: rgba(255, 244, 229, 0.62);
      --soft-text: rgba(255, 244, 229, 0.78);
      --overlay: rgba(20, 10, 8, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--cream);
      font-family: "Oldbook ITC", Georgia, serif;
      background:
        linear-gradient(var(--overlay), var(--overlay)),
        url("background.jpg") center center / cover no-repeat fixed;
    }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .payment {
      width: 100%;
      max-width: 560px;
      padding: 22px 24px 20px;
      border: 1px solid var(--line);
      background: rgba(54, 1, 0, 0.30);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.14);
    }

    .bank {
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .bank:first-child {
      padding-top: 0;
    }

    .bank-heading {
      margin-bottom: 14px;
    }

    .bank-name {
      margin: 0;
      font-family: "Briar Display", "Oldbook ITC", Georgia, serif;
      font-size: 25px;
      line-height: 1.1;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--cream);
    }

    .detail-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .detail-row + .detail-row {
      margin-top: 12px;
    }

    .detail {
      min-width: 0;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-family: Arial, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft-text);
    }

    .value {
      display: block;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 244, 229, 0.34);
      font-size: 16px;
      line-height: 1.25;
      color: var(--cream);
      overflow-wrap: anywhere;
    }

    .account-number {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums lining-nums;
      -webkit-font-feature-settings: "tnum" 1, "lnum" 1;
              font-feature-settings: "tnum" 1, "lnum" 1;
    }

    .holder-name {
      font-size: 16px;
    }

    .copy-button {
      min-width: 66px;
      padding: 9px 11px;
      border: 1px solid rgba(255, 244, 229, 0.74);
      background: rgba(255, 244, 229, 0.06);
      color: var(--cream);
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .copy-button:hover {
      background: var(--cream);
      color: var(--brown);
      border-color: var(--cream);
    }

    .paypal {
      padding: 18px 0 0;
    }

    .paypal-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .paypal-title {
      margin: 0;
      font-family: "Briar Display", "Oldbook ITC", Georgia, serif;
      font-size: 25px;
      line-height: 1.1;
      font-weight: 400;
      color: var(--cream);
    }

    .paypal-placeholder {
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 244, 229, 0.35);
      font-family: Arial, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(255, 244, 229, 0.60);
    }

    .thank-you {
      margin: 22px 0 0;
      text-align: center;
      font-family: "Briar Display", "Oldbook ITC", Georgia, serif;
      color: var(--lavender);
      font-size: 29px;
      line-height: 1.1;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
    }

    @media (max-width: 520px) {
      .page {
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
      }

      .payment {
        padding: 18px 18px 16px;
      }

      .bank-name,
      .paypal-title {
        font-size: 23px;
      }

      .detail-row {
        grid-template-columns: minmax(0, 1fr) 62px;
        gap: 8px;
      }

      .account-number {
        font-size: 16px;
      }

      .holder-name {
        font-size: 15px;
      }

      .thank-you {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="payment">

      <section class="bank">
        <div class="bank-heading">
          <h2 class="bank-name">TBC Bank</h2>
        </div>

        <div class="detail-row">
          <div class="detail">
            <span class="label">Account number</span>
            <span class="value account-number" id="tbc-account">GE39TB7905045063400003</span>
          </div>
          <button class="copy-button" type="button" onclick="copyValue('tbc-account', this)">Copy</button>
        </div>

        <div class="detail-row">
          <div class="detail">
            <span class="label">Account holder</span>
            <span class="value holder-name" id="tbc-name">Angelina Popova</span>
          </div>
          <button class="copy-button" type="button" onclick="copyValue('tbc-name', this)">Copy</button>
        </div>
      </section>

      <section class="bank">
        <div class="bank-heading">
          <h2 class="bank-name">Credo Bank</h2>
        </div>

        <div class="detail-row">
          <div class="detail">
            <span class="label">Account number</span>
            <span class="value account-number" id="credo-account">GE93CD0360000045174115</span>
          </div>
          <button class="copy-button" type="button" onclick="copyValue('credo-account', this)">Copy</button>
        </div>

        <div class="detail-row">
          <div class="detail">
            <span class="label">Account holder</span>
            <span class="value holder-name" id="credo-name">Angelina Popova</span>
          </div>
          <button class="copy-button" type="button" onclick="copyValue('credo-name', this)">Copy</button>
        </div>
      </section>

      <section class="paypal">
        <div class="paypal-line">
          <h2 class="paypal-title">PayPal</h2>
          <span class="paypal-placeholder">Link coming soon</span>
        </div>
      </section>

      <p class="thank-you">Thank you!</p>
    </main>
  </div>

  <script>
    async function copyValue(elementId, button) {
      const text = document.getElementById(elementId).textContent.trim();
      const originalText = button.textContent;

      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      button.textContent = "Copied";
      setTimeout(() => {
        button.textContent = originalText;
      }, 1300);
    }
  </script>
</body>
</html>
